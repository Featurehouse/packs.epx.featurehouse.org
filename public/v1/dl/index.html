<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset='utf-8'>
    <title>Redirecting...</title>
</head>
<body>
<script>
    !function() {
        let newLocation = new URL('//featurehouse.github.io/epx_packdl/dist/?_legacy=1', window.location.href)
        if (window.location.search) {
            const searchParams = new URLSearchParams(window.location.search)
            for (const [k, v] of searchParams.entries()) {
                newLocation.searchParams.append(k, v)
            }
        }
        window.location.href = newLocation.href
    }()
</script>
</body>
